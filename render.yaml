services:
  - type: web
    name: fastapi-app
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_HOSTNAME
        fromDatabase:
          name: fastapi-db
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: fastapi-db
          property: port
      - key: DATABASE_USERNAME
        fromDatabase:
          name: fastapi-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: fastapi-db
          property: password
      - key: DATABASE_NAME
        fromDatabase:
          name: fastapi-db
          property: database
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60

databases:
  - name: fastapi-db
    plan: free
